<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="860" viewBox="0 0 1080 860" font-family="Helvetica, Arial, sans-serif">
  <rect width="1080" height="860" fill="#F4F2EE"/>

  <!-- Card -->
  <rect x="120" y="60" width="840" height="740" rx="20" fill="#FFFFFF" stroke="#ECEAE4" stroke-width="2"/>

  <!-- Header -->
  <text x="160" y="128" font-size="20" letter-spacing="2" fill="#9A958C">MOMENTS BY CANDICE · ONLINE BOOKING</text>
  <text x="160" y="178" font-size="40" font-weight="700" fill="#141414">Book your session</text>
  <line x1="160" y1="208" x2="920" y2="208" stroke="#ECEAE4" stroke-width="2"/>

  <!-- Name -->
  <text x="160" y="258" font-size="20" fill="#6E6A63">Full name</text>
  <rect x="160" y="274" width="760" height="56" rx="10" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="2"/>
  <text x="184" y="310" font-size="22" fill="#141414">Jordan Avery</text>

  <!-- Email -->
  <text x="160" y="378" font-size="20" fill="#6E6A63">Email</text>
  <rect x="160" y="394" width="760" height="56" rx="10" fill="#FFFFFF" stroke="#D9D6CF" stroke-width="2"/>
  <text x="184" y="430" font-size="22" fill="#141414">jordan.avery@email.com</text>

  <!-- Phone -->
  <text x="160" y="498" font-size="20" fill="#6E6A63">Mobile phone (for session reminders)</text>
  <rect x="160" y="514" width="760" height="56" rx="10" fill="#FFFFFF" stroke="#141414" stroke-width="2"/>
  <text x="184" y="550" font-size="22" fill="#141414">(770) 555-0142</text>

  <!-- Consent — checkbox MUST render unchecked (carriers reject pre-selected
       consent, Twilio error 30508). The client ticks it themselves. -->
  <rect x="160" y="592" width="760" height="116" rx="10" fill="#FAFAF8" stroke="#ECEAE4" stroke-width="2"/>
  <rect x="180" y="612" width="26" height="26" rx="5" fill="#FFFFFF" stroke="#141414" stroke-width="2.5"/>
  <text x="220" y="624" font-size="17" fill="#4F4B44">By providing my number I agree to receive appointment reminder texts about my</text>
  <text x="220" y="649" font-size="17" fill="#4F4B44">session from Moments by Candice. Msg frequency varies. Msg &amp; data rates may</text>
  <text x="220" y="674" font-size="17" fill="#4F4B44">apply. Reply STOP to opt out, HELP for help. See Privacy Policy &amp; Terms.</text>

  <!-- Button -->
  <rect x="160" y="732" width="260" height="56" rx="28" fill="#141414"/>
  <text x="290" y="768" font-size="21" font-weight="600" fill="#FFFFFF" text-anchor="middle">Confirm booking</text>

  <text x="920" y="768" font-size="16" fill="#9A958C" text-anchor="end">Reminders powered by SessionRemind</text>
</svg>

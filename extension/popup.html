<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        font-family: -apple-system, system-ui, sans-serif;
        background: #14110d;
        color: #f2ece0;
        padding: 20px;
      }
      .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #be7b2e; }
      .brand strong { font-size: 15px; letter-spacing: -0.01em; }
      p.sub { font-size: 12.5px; line-height: 1.5; color: #b3a78c; margin: 0 0 16px; }
      button {
        width: 100%;
        padding: 11px 16px;
        border: 0;
        border-radius: 10px;
        background: #be7b2e;
        color: #14110d;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      #status { margin-top: 14px; font-size: 12.5px; line-height: 1.5; color: #d8cdb8; min-height: 18px; }
      a { color: #be7b2e; }
    </style>
  </head>
  <body>
    <div class="brand"><span class="dot"></span><strong>SessionRemind</strong></div>
    <p class="sub">
      Make sure you're logged into UseSession (this tab) and into SessionRemind in this browser, then connect.
    </p>
    <button id="connect">Connect this account</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
